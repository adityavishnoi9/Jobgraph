# ==============================
# Postgres connection
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/jobgraph
spring.datasource.username=postgres
spring.datasource.password=Aditya2004@
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
# ddl-auto=update lets Hibernate create/alter tables from your entities.
# Use this ONLY in local dev. Switch to 'validate' or 'none' later once
# you're using schema.sql directly, to avoid Hibernate silently altering
# production tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JSON mapping
# ==============================
# Gemini's response uses snake_case (fname, linkedin_url, etc).
# This lets our DTOs use normal camelCase fields and still map correctly.
gemini.api.key=API_KEY
gemini.model=gemini-3.5-flash
# ==============================
# Server
# ==============================
server.port=8080